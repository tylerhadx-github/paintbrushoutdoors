<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/brand-icon.png" />
  <link rel="apple-touch-icon" href="/brand-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0b10" />
  <meta name="description" content="Tyler Haddix - senior full-stack engineer shipping real apps, products, and hardware. An animated showcase of live products across web, mobile, GIS, AI, and IoT." />
  <link href="https://use.fontawesome.com/releases/v5.0.13/css/all.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <title>Tyler Haddix - Full-Stack Engineer & Product Builder</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    html,
    body,
    #app {
      margin: 0;
      background-color: #0b0b10;
      color: #f4f4f8;
    }

    section[id] {
      scroll-margin-top: 80px;
    }

    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
